name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # SQL Server 適合テスト（M5-3。Issue #47）の CI 実行手段。
      #
      # 実体検証（確認日 2026-07-05）: actions/runner-images の Windows2022-Readme.md を直接確認した。
      # 「Installed Software > Databases」節は PostgreSQL・MongoDB のみを standalone サービスとして
      # 掲載しており、SQL Server / LocalDB は掲載されない。一方「Visual Studio Enterprise 2022」の
      # ワークロード構成要素として Microsoft.VisualStudio.Component.SQL.LocalDB.Runtime が含まれる
      # （バージョン 17.14.36510.44）。これは VS のコンポーネントであり、独立した保証ではない。
      #
      # actions/runner-images issue #3691「Add SQL Server Express LocalDB」のメンテナ回答が
      # 明確な結論を与える: sqllocaldb.exe の存在は保証せず、`sqllocaldb info MSSQLLocalDB` で
      # 確認し、無ければ公式 MSI（SqlLocalDB.msi）をその場でダウンロード・サイレントインストール
      # する防御的パターンを推奨している。本ステップはそのパターンをそのまま採用する
      # （代替候補として検討した potatoqualitee/mssqlsuite アクションは不採用——本製品が必要と
      # するのは LocalDB のみであり、追加の外部アクション依存を増やすほどの利益がないため、
      # Microsoft 公式 MSI を直接叩く最小構成を選んだ）。
      - name: Ensure SQL Server LocalDB is available
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          Write-Host "Checking for existing MSSQLLocalDB instance..."
          $instanceExists = & sqllocaldb info MSSQLLocalDB 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $instanceExists) {
            Write-Host "MSSQLLocalDB not found. Downloading official SqlLocalDB.msi..."
            Import-Module BitsTransfer
            Start-BitsTransfer -Source https://download.microsoft.com/download/7/c/1/7c14e92e-bdcb-4f89-b7cf-93543e7112d1/SqlLocalDB.msi -Destination SqlLocalDB.msi
            Write-Host "Installing SqlLocalDB.msi..."
            Start-Process -FilePath "SqlLocalDB.msi" -Wait -ArgumentList "/qn", "/norestart", "/l*v SqlLocalDBInstall.log", "IACCEPTSQLLOCALDBLICENSETERMS=YES"
          } else {
            Write-Host "MSSQLLocalDB instance already registered."
          }

          Write-Host "Starting MSSQLLocalDB instance..."
          # sqllocaldb.exe はネイティブ実行ファイルであり -ErrorAction は使えない
          # （PowerShell コマンドレット専用のパラメータのため）。インスタンスが既に存在する場合の
          # "create" の失敗は無視してよいため、終了コードを見ずに実行を続ける。
          sqllocaldb create MSSQLLocalDB
          sqllocaldb start MSSQLLocalDB
          sqllocaldb info MSSQLLocalDB

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      # CI 回帰ベンチ（M7-3。Issue #62。architecture.md §5.2）。
      #
      # 代表シナリオの短縮版を 2 本走らせ、tools/Yagura.Bench/baselines/ci-baseline.json の
      # 基準値と比較する（絶対値の合否は行わない——§5.2「CI の回帰判定は基準比とする」）。
      # レートは開発機ではなく CI ランナー（windows-latest）の性能を前提に控えめに設定する
      # （目安 5k/s。ランナー性能は開発機と別物のため）。追加時間の目安は 2〜3 分
      # （SustainedZeroDrop 10 秒 + ProviderWriteCeiling(SQLite) 8 秒の負荷時間本体 + 起動/停止/
      # ビルド出力コピー等のオーバーヘッド）。
      #
      # 許容帯は M-5 初回実測（2026-07-06。同一コミットの CI run 6 回再実行。一次データ:
      # tools/Yagura.Bench/results/2026-07-06-ci-windows-latest-m5/）で確定済み:
      # ProviderWriteCeiling が blocking 判定（toleranceRatio=0.15。観測分散 <0.1% に対し約 150 倍の
      # 余裕）、SustainedZeroDrop は保存率が双峰性（6 回中 3 回 Q1 破棄）のため比判定を情報表示に
      # 降格（enforceRatio=false。突合成立の不変条件は維持——ここが破れたら失敗する）。
      # 帯・判定モードの変更手続きは conventions.md「CI 回帰ベンチの基準値更新」節。
      #
      # グレースフル停止（Ctrl+C 経由。ConsoleCtrlSender）は CI のようなコンソールを持たない
      # 実行環境では機能しない可能性がある。その場合は Yagura.Bench.HostProcess.BenchHostProcess が
      # Kill にフォールバックする——本回帰ベンチが使う 2 シナリオはいずれも「送信数 = 保存件数」の
      # 単純な等式（破棄・退避ゼロ想定）であり、drain 完了後に停止する設計のため、Kill
      # フォールバックが発生してもカウンタの取りこぼしは判定に影響しない（M7-1 の煙テストで
      # 確認済みの前例と同じ考え方）。
      - name: Regression bench (SustainedZeroDrop)
        run: >
          dotnet tools/Yagura.Bench/bin/Release/net10.0/Yagura.Bench.dll
          SustainedZeroDrop --transport udp --rate 5000 --duration 10
          --output-dir bench-results
          --compare-baseline tools/Yagura.Bench/baselines/ci-baseline.json

      - name: Regression bench (ProviderWriteCeiling / SQLite)
        run: >
          dotnet tools/Yagura.Bench/bin/Release/net10.0/Yagura.Bench.dll
          ProviderWriteCeiling --rate 3000 --duration 8
          --output-dir bench-results
          --compare-baseline tools/Yagura.Bench/baselines/ci-baseline.json

      - name: Upload regression bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-bench-results
          path: bench-results/
          if-no-files-found: ignore
