# インストーラ E2E(M9-2。Issue #75): ゼロ設定ファーストランの証拠(ADR-0006 基準 1)。
#
# MSI をビルドし、GitHub ホストランナー上で実際にサイレントインストール →
# サービス起動 → UDP 514 受信 → 閲覧リスナ(8514)照合 → アンインストール →
# 残置物確認までを installer/e2e/Invoke-YaguraInstallerE2E.ps1 で実行する。
#
# トリガ設計(CI 時間への配慮):
#   - pull_request は installer/ 配下(+ 本 workflow 自身)の変更時のみ。
#     src/ 側の変更はビルド・テスト・回帰ベンチを ci.yml が検証しており、
#     本 workflow は MSI の構造・インストール挙動の検証に特化する
#   - workflow_dispatch で任意時点の実行(リリース前の証拠採取等)を可能にする
#
# ci.yml には触れない(並行 PR との衝突回避。M9-1 からの方針)。
name: Installer E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'installer/**'
      - '.github/workflows/installer-e2e.yml'

permissions:
  contents: read

# 同一 PR への連続 push では古い run を自動キャンセルする(Actions 時間の節約。
# ci.yml と同じ設計。workflow_dispatch はキャンセル対象にしない)。
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  installer-e2e:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      # MSI ビルド(installer/README.md の手順と同一)。内部で Yagura.Host を
      # self-contained (win-x64) で publish してから WiX が焼く。本ワークフローは
      # x64 専用のまま維持する(ADR-0009 決定5「installer-e2e.yml 相当の重い E2E は
      # 当面 x64 のみに残す」)。ARM64 は .github/workflows/release.yml の smoke-arm64
      # ジョブ(windows-11-arm 実アーキ)が担う。
      - name: Build MSI
        run: dotnet build installer/Yagura.Installer.wixproj -c Release -p:YaguraArch=x64

      # 管理者権限の根拠(実体検証済みの公式記載):
      # GitHub 公式ドキュメント「GitHub-hosted runners reference」の
      # 「Administrative privileges」節(docs.github.com/en/actions/reference/
      # runners/github-hosted-runners、確認日 2026-07-06)に次の記載がある:
      #   "Windows virtual machines are configured to run as administrators with
      #    User Account Control (UAC) disabled."
      # したがって msiexec /qn(per-machine サイレントインストール)は昇格プロンプト
      # なしで実行できる見込み。ただしサービス起動(仮想サービスアカウント
      # NT SERVICE\Yagura)を含む実挙動はここで初めて実体検証される(Issue #75:
      # 成立しない場合は lab 手順書 + 開発機実行の記録方式へ縮退し、判断を PR に残す)。
      #
      # 検証・照合は ASCII トークン(RunId)のみで行う(en-US ランナーの
      # コードページ CP437 で日本語照合が文字化けする——スクリプト内コメント参照)。
      - name: Run installer E2E
        shell: pwsh
        run: |
          # MSI パスは実出力から解決する(既定は installer/bin/Release/ja-JP/Yagura-x64.msi。
          # ADR-0009 決定4 で成果物命名にアーキサフィックスが付いた——WiX SDK の出力パス構成の
          # 変化にも頑健にするため Filter は "Yagura-*.msi" のワイルドカードにする)。
          $msi = Get-ChildItem -Path installer/bin -Recurse -Filter Yagura-*.msi |
            Select-Object -First 1
          if ($null -eq $msi) {
            throw 'Yagura-*.msi not found under installer/bin'
          }
          Write-Host "MSI: $($msi.FullName)"
          ./installer/e2e/Invoke-YaguraInstallerE2E.ps1 `
            -MsiPath $msi.FullName `
            -OutputDir 'e2e-results'

      # 証拠 artifact(ADR-0006 基準 1): 人間可読ログ(*.log.txt)+ 機械可読サマリ
      # (*.summary.json)+ msiexec 詳細ログ。失敗時も必ず残す(失敗の記録も証拠)。
      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: installer-e2e-results
          path: e2e-results/
          if-no-files-found: warn
