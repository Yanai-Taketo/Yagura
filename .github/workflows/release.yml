# リリース用ワークフロー(ADR-0009 決定5・決定6 Phase1。委任事項6)。
#
# x64・ARM64 の RID マトリクスで MSI をビルドし、ARM64 は windows-11-arm ホストランナー
# (実アーキ)でスモーク(起動・受信・閲覧・観測性カウンタ出力・スプール発動→drain の 1
# サイクル。決定6 Phase1 完了条件①②)を通してから GitHub Release を作成する。
# x64 は決定2 のとおり実機 lab・installer-e2e.yml(重い E2E)が別途品質を担保しているが、
# 本ワークフローでも公開直前の Full E2E を最小限のゲートとして通す(壊れた MSI を公開しない)。
#
# ADR-0009 決定6「Phase 0 の完了を、ARM64 配布物(MSI・Release 資産)の公開および入口文書での
# 対応表明の前提条件とする」——Phase 0 は PR #185 で合格済み(windows-11-arm 実アーキでの
# publish・PE ヘッダ確認・起動〜閲覧・カウンタ出力を確認)。本ワークフローは Phase 1(ビルド・
# リリース基盤)にあたる。
#
# .github/workflows/adr-0009-arm64-phase0-gate.yml(Phase 0 ゲート専用。恒久 CI ステップではない
# 前提でワークフローコメントに明記済み)は、本ワークフローの smoke-arm64 ジョブが同水準以上の
# 検証(実 MSI インストール経由の起動・受信・閲覧・カウンタ確認 + スプールサイクル)を行うため
# 本 PR で削除し、置き換える。
#
# トリガ: バージョンタグ push(v*)+ 手動 dispatch(ADR-0009 決定5)。手動 dispatch は既定で
# ビルド・スモークのみを行い GitHub Release は作成しない(publish_release 入力で明示 opt-in)
# ——実装 PR での動作確認(gh workflow run)が実リリースを誤って切らないようにするため。
# pull_request(本ファイル自身の変更のみ)は installer-e2e.yml・
# adr-0009-arm64-phase0-gate.yml(削除済み)と同じ設計: workflow_dispatch は GitHub の制約上
# 既定ブランチにファイルが存在しないと呼び出せない(PR #185 で実機確認済みの制約)ため、
# 導入 PR 自身の上で実行し run URL を PR に記録できる経路として残す。create-release ジョブは
# push(タグ)/workflow_dispatch 以外のイベントでは if 条件により実行されないため、
# pull_request 実行で実リリースが誤って切られることはない。
name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'true で GitHub Release を実際に作成・公開する(既定 false = ビルド・スモークの動作確認のみ)'
        type: boolean
        default: false

# 最小権限: ワークフロー既定は read とし、Release 作成に必要な contents: write は
# create-release ジョブのみに付与する(conventions.md「リリース workflow の GITHUB_TOKEN には
# contents: write を明示付与する」の要求を、書込が実際に要るジョブに限定して満たす。
# PR #212 レビュー指摘の最小化対応)。
permissions:
  contents: read

jobs:
  # ADR-0009 決定4・決定5: x64・ARM64 の RID マトリクスで publish + MSI ビルドを行う。
  # ARM64 のビルド自体は x64 ランナー上でのクロス publish で足りる(実アーキ実行が要るのは
  # 後続の smoke-arm64 ジョブ)。
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # バージョンはタグ(v*)から取る。workflow_dispatch(タグなし)実行時は Package.wxs の
      # Version をそのまま使う(conventions.md「リリース」: バージョンは chore(release) PR で
      # 事前に Package.wxs へ焼き込む運用——550475b 等の前例と同じ)。
      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          # バージョンの単一の正は Directory.Build.props の <YaguraVersion>(ADR-0014 決定7)。
          # installer/Package.wxs と各アセンブリはこれを参照するため三者は構造的に一致する。
          $propsMatch = Select-String -Path Directory.Build.props -Pattern '<YaguraVersion>(\d+\.\d+\.\d+)</YaguraVersion>' | Select-Object -First 1
          if ($null -eq $propsMatch) {
            throw 'Directory.Build.props から <YaguraVersion> を読み取れなかった'
          }
          $srcVersion = $propsMatch.Matches[0].Groups[1].Value

          $tagVersion = $null
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tagVersion = $env:GITHUB_REF -replace '^refs/tags/v', ''
          }

          if ($null -ne $tagVersion -and $tagVersion -ne $srcVersion) {
            throw "タグのバージョン($tagVersion)と Directory.Build.props の YaguraVersion($srcVersion)が一致しない。chore(release) PR で Directory.Build.props を先に更新すること。"
          }

          $version = if ($null -ne $tagVersion) { $tagVersion } else { $srcVersion }
          Write-Host "resolved version = $version (source: $(if ($null -ne $tagVersion) { 'git tag' } else { 'Directory.Build.props (workflow_dispatch)' }))"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # ADR-0009 決定5: publish 出力に含まれるネイティブ依存にも脆弱性スキャン/監査を適用する。
      # 実装: Directory.Build.props(リポジトリ共通)が NuGetAuditMode=all +
      # WarningsAsErrors(NU1900-1904)を既定で有効化しており、restore/build/publish のたびに
      # 適用される(conventions.md「CI」の「依存パッケージの脆弱性スキャンを CI に組み込み、
      # 検出時は PR をブロックする」と同じ仕組み)。この監査はパッケージ ID・バージョン単位の
      # 脆弱性データベース照合であり RID(win-x64/win-arm64)に依存しないため、x64・ARM64
      # いずれの restore でも同じ監査が働く。本ステップは restore を明示的に単独実行し、
      # 監査結果をログ上で見える形にする(下の Build ステップでも同じ restore が走るため
      # 二重にはなるが、失敗時の切り分けを容易にする)。
      - name: Dependency vulnerability audit (${{ matrix.arch }})
        run: dotnet restore installer/Yagura.Installer.wixproj -p:YaguraArch=${{ matrix.arch }}

      - name: Build MSI (${{ matrix.arch }})
        run: dotnet build installer/Yagura.Installer.wixproj -c Release -p:YaguraArch=${{ matrix.arch }} --no-restore

      # 成果物命名(ADR-0009 決定4): 全アーキで明示サフィックス + バージョンを冠する
      # (例 Yagura-0.3.0-x64.msi)。SHA256 チェックサムは既存リリース資産と同じ書式
      # (大文字 16 進 + 半角スペース 2 個 + ファイル名。v0.1.0 以降の前例 Yagura-<version>.msi.sha256
      # と同一書式であることを実際のリリース資産で確認済み)。
      - name: Package release artifact (${{ matrix.arch }})
        id: artifact
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $arch = '${{ matrix.arch }}'
          $version = '${{ steps.version.outputs.version }}'
          $srcMsi = "installer/bin/Release/ja-JP/Yagura-$arch.msi"
          if (-not (Test-Path -Path $srcMsi)) {
            throw "MSI not found: $srcMsi"
          }

          $destDir = 'release-out'
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $destName = "Yagura-$version-$arch.msi"
          $destPath = Join-Path $destDir $destName
          Copy-Item -Path $srcMsi -Destination $destPath

          $hash = (Get-FileHash -Path $destPath -Algorithm SHA256).Hash
          $shaPath = "$destPath.sha256"
          [System.IO.File]::WriteAllText($shaPath, "$hash  $destName`n", (New-Object System.Text.UTF8Encoding($false)))

          Write-Host "artifact=$destName sha256=$hash"
          "name=$destName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload build artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v7
        with:
          name: release-msi-${{ matrix.arch }}
          path: release-out/
          if-no-files-found: error

  # ADR-0009 決定5・決定6 Phase1 完了条件①: 起動・受信・閲覧・観測性カウンタ出力のスモークを
  # windows-11-arm ホストランナー(実アーキ)で行う。実 MSI インストール経由の Full E2E を使い、
  # installer-e2e.yml(x64)と同じスクリプト・同じ検証水準にする(決定2「設計原則は全アーキ共通」)。
  smoke-arm64:
    needs: build
    runs-on: windows-11-arm
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Download ARM64 MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: release-msi-arm64
          path: release-out

      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path release-out -Filter '*.msi' | Select-Object -First 1
          if ($null -eq $msi) { throw 'ARM64 MSI artifact not found' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Full E2E(installer/e2e/Invoke-YaguraInstallerE2E.ps1): サイレントインストール →
      # サービス起動 → UDP 受信 → 閲覧照合 → 対話フレームワーク配信確認 → 観測性カウンタ出力
      # 確認(本 PR で追加) → アンインストール → 残置物確認。management 権限は GitHub 公式の
      # 「Windows virtual machines are configured to run as administrators with UAC disabled」
      # (installer-e2e.yml のコメントと同じ根拠)が windows-11-arm にも適用される前提。
      - name: Run installer E2E (ARM64, real MSI install)
        shell: pwsh
        run: |
          ./installer/e2e/Invoke-YaguraInstallerE2E.ps1 `
            -MsiPath '${{ steps.msi.outputs.path }}' `
            -OutputDir 'e2e-results-arm64'

      - name: Upload ARM64 E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-arm64-e2e-results
          path: e2e-results-arm64/
          if-no-files-found: warn

      # ADR-0009 決定6 Phase1 完了条件②: スプール発動 → drain 追いつきの 1 サイクルを ARM64
      # 実アーキ上で通過させる。Yagura.Bench の SpoolActivationRecovery シナリオ(tools/Yagura.Bench/
      # README.md)をそのまま使う——本体プロセスを子プロセスとして実バイナリで起動し、スプール
      # 容量を縮小(--spool-quota-bytes)して意図的に発動させ、drain 完了(ExternalSpoolUsageProbe
      # がスプール使用量 0 を確認)までを検証器が突合する。self-contained の publish 出力ではなく
      # フレームワーク依存ビルド(dotnet build)を使うが、CLR の JIT は実行ホストのネイティブ
      # ISA(ARM64)へコンパイルするため「ARM64 実アーキ上での実行」という要件は満たす
      # (self-contained は配布形態の話であり実行アーキの話ではない)。
      - name: Build Yagura.Bench (ARM64 runner, native JIT)
        run: dotnet build tools/Yagura.Bench/Yagura.Bench.csproj -c Release

      - name: Spool activation -> drain smoke (ARM64, 1 cycle)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          dotnet tools/Yagura.Bench/bin/Release/net10.0/Yagura.Bench.dll `
            SpoolActivationRecovery --spool-quota-bytes 2097152 --burst-count 5000 `
            --output-dir bench-results-arm64
          if ($LASTEXITCODE -ne 0) {
            throw "SpoolActivationRecovery failed on ARM64 (exit $LASTEXITCODE) - see bench-results-arm64/"
          }
          Write-Host 'OK: spool activation -> drain cycle reconciled on ARM64 real hardware'

      # 委任事項3(縮小版実測): ARM64 の持続流量目安を最低限記録する。M 系(architecture.md §7)の
      # 基準値は x64 CI ランナーで確定済みのものであり ARM64 へは転用しない(ADR-0009 決定6
      # 委任事項3)。本ステップは「試験的」表記の裏付けとなる参考値の採取のみが目的で、
      # CI のブロッキング判定には使わない(比較基準を持たないため)。
      - name: Sustained throughput reference sample (ARM64, informational)
        shell: pwsh
        run: |
          dotnet tools/Yagura.Bench/bin/Release/net10.0/Yagura.Bench.dll `
            SustainedZeroDrop --transport udp --rate 1000 --duration 10 `
            --output-dir bench-results-arm64
          Write-Host "exit code: $LASTEXITCODE (informational - not blocking. ADR-0009 委任事項3)"

      - name: Upload ARM64 bench evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-arm64-bench-results
          path: bench-results-arm64/
          if-no-files-found: warn

  # x64 は決定2で「実機lab・回帰ベンチを維持」と定められているが、公開直前に壊れた MSI を
  # 誤って配布しないための最小ゲートとして Full E2E を通す(installer-e2e.yml の重い検証とは
  # 独立に、リリース対象そのものを検証する)。
  smoke-x64:
    needs: build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download x64 MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: release-msi-x64
          path: release-out

      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path release-out -Filter '*.msi' | Select-Object -First 1
          if ($null -eq $msi) { throw 'x64 MSI artifact not found' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run installer E2E (x64, real MSI install)
        shell: pwsh
        run: |
          ./installer/e2e/Invoke-YaguraInstallerE2E.ps1 `
            -MsiPath '${{ steps.msi.outputs.path }}' `
            -OutputDir 'e2e-results-x64'

      - name: Upload x64 E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-x64-e2e-results
          path: e2e-results-x64/
          if-no-files-found: warn

  # ADR-0014 決定3: 未署名で機能検証(build + smoke)を通した後、GitHub Environment の承認ゲートを
  # 挟んで署名する。deep signing(自前アセンブリのみ)→ 署名済み publish 出力から MSI を再ビルド →
  # MSI を署名し、Subject・タイムスタンプまで検証する(Invoke-YaguraSign.ps1)。
  #
  # 【重要】このジョブは vars.YAGURA_SIGNING == 'enabled' のときだけ動く。証明書チェーン
  # (installer/sign/codesign-chain.pem)・WIF・リポジトリ変数・Environment が揃うまで未設定のままにし、
  # 現行の未署名リリース経路を壊さない。有効化前の通し検証手順は installer/sign/README.md 参照。
  # 署名は arch 非依存のため windows-latest で両アーキを署名する(arm64 MSI はクロス publish)。
  sign:
    needs: [build, smoke-arm64, smoke-x64]
    if: |
      vars.YAGURA_SIGNING == 'enabled' &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'))
    strategy:
      fail-fast: true
      matrix:
        arch: [x64, arm64]
    runs-on: windows-latest
    # 承認ゲート(決定3): required reviewers = オーナー を設定した Environment。
    environment: release-signing
    permissions:
      contents: read
      id-token: write  # WIF の OIDC トークン発行に必要
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Java (jsign 実行用)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # 供給網保護(決定3): jsign を版固定 + SHA256 照合してから使う。
      - name: Download and verify jsign 7.5
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri 'https://github.com/ebourg/jsign/releases/download/7.5/jsign-7.5.jar' -OutFile jsign.jar
          $hash = (Get-FileHash jsign.jar -Algorithm SHA256).Hash.ToLower()
          $expected = '602a51c3545a6dc4fb99bd2ea7152b26d1345916d0c93ddfbd5936cb735af91c'
          if ($hash -ne $expected) { throw "jsign SHA256 不一致: got=$hash expected=$expected" }
          Write-Host 'jsign 7.5 SHA256 OK'

      # WIF(決定1・委任3): 長期秘密を置かず、短命アクセストークンを取得する。auth アクションは
      # SHA ピン(v3.0.0)。
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SIGNER_SA }}
          token_format: access_token

      - name: Publish Yagura.Host (${{ matrix.arch }})
        run: dotnet publish src/Yagura.Host/Yagura.Host.csproj -c Release -r ${{ matrix.arch == 'x64' && 'win-x64' || 'win-arm64' }} --self-contained true -o ${{ github.workspace }}/publish/${{ matrix.arch }}

      # deep signing(決定2): 自前の Yagura.Host.exe と Yagura.*.dll のみ署名する。
      # 上流(.NET ランタイム・第三者 DLL)は署名しない。
      - name: Sign own assemblies (${{ matrix.arch }})
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $pub = "${{ github.workspace }}/publish/${{ matrix.arch }}"
          $files = @()
          $files += (Get-ChildItem -LiteralPath $pub -Recurse -Filter 'Yagura.Host.exe').FullName
          $files += (Get-ChildItem -LiteralPath $pub -Recurse -Filter 'Yagura.*.dll').FullName
          ./installer/sign/Invoke-YaguraSign.ps1 -JsignJar jsign.jar `
            -KeyRingResource '${{ vars.GCP_KEYRING }}' -KeyAlias '${{ vars.GCP_KEY_ALIAS }}' `
            -CertFile installer/sign/codesign-chain.pem `
            -AccessToken '${{ steps.auth.outputs.access_token }}' `
            -ExpectedSubject '${{ vars.SIGNER_SUBJECT }}' -Files $files

      # 署名済み publish 出力から MSI を焼く(SkipYaguraHostPublish で再 publish を抑止)。
      - name: Build MSI from signed output (${{ matrix.arch }})
        run: dotnet build installer/Yagura.Installer.wixproj -c Release -p:YaguraArch=${{ matrix.arch }} -p:SkipYaguraHostPublish=true -p:YaguraPublishDir=${{ github.workspace }}/publish/${{ matrix.arch }}

      - name: Sign MSI + package (${{ matrix.arch }})
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $version = '${{ needs.build.outputs.version }}'
          $arch = '${{ matrix.arch }}'
          $srcMsi = "installer/bin/Release/ja-JP/Yagura-$arch.msi"
          if (-not (Test-Path $srcMsi)) { throw "MSI not found: $srcMsi" }
          ./installer/sign/Invoke-YaguraSign.ps1 -JsignJar jsign.jar `
            -KeyRingResource '${{ vars.GCP_KEYRING }}' -KeyAlias '${{ vars.GCP_KEY_ALIAS }}' `
            -CertFile installer/sign/codesign-chain.pem `
            -AccessToken '${{ steps.auth.outputs.access_token }}' `
            -ExpectedSubject '${{ vars.SIGNER_SUBJECT }}' -Files @($srcMsi)

          $destDir = 'release-out'
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $destName = "Yagura-$version-$arch.msi"
          $destPath = Join-Path $destDir $destName
          Copy-Item -Path $srcMsi -Destination $destPath
          # SHA256 は必ず署名済み MSI に対して算出する(決定3)。
          $hash = (Get-FileHash -Path $destPath -Algorithm SHA256).Hash
          [System.IO.File]::WriteAllText("$destPath.sha256", "$hash  $destName`n", (New-Object System.Text.UTF8Encoding($false)))
          Write-Host "signed artifact=$destName sha256=$hash"

      - name: Upload signed artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v7
        with:
          name: release-msi-signed-${{ matrix.arch }}
          path: release-out/
          if-no-files-found: error

  # ADR-0014 決定3: 署名済み MSI そのものに対して Full E2E を再実行する(「テストしたものと
  # 出荷するものが違う」状態を作らない)。既存の smoke ジョブと同じスクリプト・同じランナー。
  smoke-signed-x64:
    needs: sign
    if: vars.YAGURA_SIGNING == 'enabled'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Download signed x64 MSI
        uses: actions/download-artifact@v8
        with:
          name: release-msi-signed-x64
          path: release-out
      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path release-out -Filter '*.msi' | Select-Object -First 1
          if ($null -eq $msi) { throw 'signed x64 MSI not found' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - name: Run installer E2E (x64, signed MSI)
        shell: pwsh
        run: ./installer/e2e/Invoke-YaguraInstallerE2E.ps1 -MsiPath '${{ steps.msi.outputs.path }}' -OutputDir 'e2e-signed-x64'
      - name: Upload signed x64 E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-signed-x64-e2e-results
          path: e2e-signed-x64/
          if-no-files-found: warn

  smoke-signed-arm64:
    needs: sign
    if: vars.YAGURA_SIGNING == 'enabled'
    runs-on: windows-11-arm
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Download signed ARM64 MSI
        uses: actions/download-artifact@v8
        with:
          name: release-msi-signed-arm64
          path: release-out
      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path release-out -Filter '*.msi' | Select-Object -First 1
          if ($null -eq $msi) { throw 'signed ARM64 MSI not found' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      - name: Run installer E2E (ARM64, signed MSI)
        shell: pwsh
        run: ./installer/e2e/Invoke-YaguraInstallerE2E.ps1 -MsiPath '${{ steps.msi.outputs.path }}' -OutputDir 'e2e-signed-arm64'
      - name: Upload signed ARM64 E2E evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-signed-arm64-e2e-results
          path: e2e-signed-arm64/
          if-no-files-found: warn

  # GitHub Release の作成。タグ push では常に公開する。workflow_dispatch では
  # publish_release=true の場合のみ(既定 false = ビルド・スモークの動作確認のみで実リリースは
  # 切らない)。
  #
  # ADR-0014 決定3: 署名有効時(vars.YAGURA_SIGNING == 'enabled')は署名済み artifact を公開し、
  # 揃っていなければ fail-closed(未署名を公開しない)。署名無効時は従来どおり未署名を公開する。
  # sign / smoke-signed-* が skip されても create-release は走るよう if で明示的に許容する。
  create-release:
    needs: [build, smoke-arm64, smoke-x64, sign, smoke-signed-x64, smoke-signed-arm64]
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.smoke-arm64.result == 'success' &&
      needs.smoke-x64.result == 'success' &&
      (needs.sign.result == 'success' || needs.sign.result == 'skipped') &&
      (needs.smoke-signed-x64.result == 'success' || needs.smoke-signed-x64.result == 'skipped') &&
      (needs.smoke-signed-arm64.result == 'success' || needs.smoke-signed-arm64.result == 'skipped') &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'))
    runs-on: windows-latest
    # GitHub Release の作成・資産アップロードに必要な書込権限は本ジョブのみに付与する
    # (build/smoke 系ジョブは read で足りる。最小権限の原則)。
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # 署名有効時は署名済み(release-msi-signed-*)を、無効時は未署名(release-msi-*)を取得する。
      # ※ release-msi-* は署名済みにも前方一致するため、有効時は必ず signed パターンに限定する。
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ vars.YAGURA_SIGNING == 'enabled' && 'release-msi-signed-*' || 'release-msi-*' }}
          path: release-out
          merge-multiple: true

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem -Path release-out -Recurse | Format-Table FullName, Length

      # 決定3(fail-closed): 署名有効時は、署名済み MSI が全アーキ揃い、かつ公開直前に
      # Authenticode 有効・署名者 Subject 一致であることを確認する。1 つでも欠ければ公開しない。
      - name: Verify signed artifacts (fail-closed)
        if: vars.YAGURA_SIGNING == 'enabled'
        shell: pwsh
        env:
          SIGNER_SUBJECT: ${{ vars.SIGNER_SUBJECT }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $msis = @(Get-ChildItem -Path release-out -Filter '*.msi')
          if ($msis.Count -lt 2) {
            throw "署名済み MSI が全アーキ揃っていない($($msis.Count)/2)。未署名は公開しない(決定3)"
          }
          foreach ($m in $msis) {
            $sig = Get-AuthenticodeSignature -LiteralPath $m.FullName
            if ($sig.Status -ne 'Valid') { throw "$($m.Name) の署名が Valid でない: $($sig.Status)" }
            if ($sig.SignerCertificate.Subject -notlike "*$($env:SIGNER_SUBJECT)*") {
              throw "$($m.Name) の署名者 Subject 不一致: $($sig.SignerCertificate.Subject)"
            }
            if ($null -eq $sig.TimeStamperCertificate) { throw "$($m.Name) にタイムスタンプが無い(決定9)" }
          }
          Write-Host "OK: 署名済み MSI $($msis.Count) 件の署名・Subject・タイムスタンプを確認"

      # ADR-0009 決定2・決定6 Phase1 完了条件③: Release Notes に検証水準の非対称性の定型文言
      # (x64=対応/ARM64=試験的の要約 + ADR-0009 へのリンク)を、最初の ARM64 MSI 公開より前に
      # 追加する。以後の全リリースで継続する(README 全面更新は ADR-0009 決定6 Phase3。
      # 告知定型文はそれを待たず Phase1 で先行させる)。
      - name: Compose release notes
        id: notes
        shell: pwsh
        env:
          YAGURA_SIGNING: ${{ vars.YAGURA_SIGNING }}
          SIGNER_SUBJECT: ${{ vars.SIGNER_SUBJECT }}
        run: |
          $version = '${{ needs.build.outputs.version }}'
          # 署名有効時: 署名の事実と検証手順(決定5)を定型で載せる。
          $signingNote = ''
          if ($env:YAGURA_SIGNING -eq 'enabled') {
            $signingNote = @"

          ## コード署名

          この MSI は Authenticode コード署名(タイムスタンプ付き)されています。発行元(署名者)が
          「$($env:SIGNER_SUBJECT)」であることを確認してから実行してください。

          - GUI: MSI を右クリック → プロパティ → 「デジタル署名」タブ → 署名者を確認
          - PowerShell: ``Get-AuthenticodeSignature <ファイル>`` の Status が ``Valid`` で、署名者に「$($env:SIGNER_SUBJECT)」が含まれること
          - 署名の仕組み・ポリシーは [コード署名ポリシー](https://github.com/Yanai-Taketo/Yagura/blob/main/docs/code-signing-policy.md) を参照

          "@
          }
          $notes = @"
          ## アーキテクチャ対応 (ADR-0009)

          | アーキ | 検証水準 | 対象環境 |
          |---|---|---|
          | x64 | 対応(Supported) | Windows Server 全般 + Windows 10/11 クライアント |
          | ARM64 | 試験的(Experimental) | Windows 11 on Arm 等のクライアント OS のみ(Windows Server の ARM64 は対象外) |

          ARM64 は起動・受信・閲覧・観測性カウンタ出力・スプール発動→drain 追いつきの実機スモークまでを
          検証水準としており、x64 のような実機 lab E2E・CI 回帰ベンチは対象外です。不具合は受け付けますが
          修正 SLA は約束しません。詳細は [ADR-0009](https://github.com/Yanai-Taketo/Yagura/blob/main/docs/adr/0009-architecture-support.md) を参照してください。

          **迷ったら x64 を選んでください。** 自分の環境のアーキを確認するには「設定 > システム > バージョン情報」の「システムの種類」を確認してください。

          ## ダウンロード

          | ファイル | 対象 |
          |---|---|
          | ``Yagura-$version-x64.msi`` | x64(対応) |
          | ``Yagura-$version-arm64.msi`` | ARM64(試験的) |

          各 ``.msi.sha256`` はチェックサム検証用です。
          $signingNote
          "@
          $notesPath = "$env:RUNNER_TEMP/release-notes.md"
          [System.IO.File]::WriteAllText($notesPath, $notes, (New-Object System.Text.UTF8Encoding($false)))
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = '${{ needs.build.outputs.version }}'
          $tag = "v$version"
          $notesPath = '${{ steps.notes.outputs.path }}'
          $files = Get-ChildItem -Path release-out -File | ForEach-Object { $_.FullName }

          $existing = gh release view $tag --json tagName 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          } else {
            gh release create $tag @files --title "Yagura $tag" --notes-file $notesPath
          }

      # ADR-0014 決定3(公開後検証): SHA256 移設漏れ・公開事故を検知するため、公開された資産を
      # 取り直して署名・Subject・.sha256 を突合し、証明書の thumbprint を証跡として記録する。
      # 署名有効時のみ。失敗すれば公開直後に気づける(既に公開済みでもアラートになる)。
      - name: Post-publish verification
        if: vars.YAGURA_SIGNING == 'enabled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNER_SUBJECT: ${{ vars.SIGNER_SUBJECT }}
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $tag = "v${{ needs.build.outputs.version }}"
          $dir = "verify-published"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          gh release download $tag --dir $dir --pattern '*.msi' --pattern '*.sha256' --clobber
          $msis = @(Get-ChildItem -Path $dir -Filter '*.msi')
          if ($msis.Count -lt 2) { throw "公開資産の MSI が揃っていない($($msis.Count)/2)" }
          foreach ($m in $msis) {
            # 署名検証
            $sig = Get-AuthenticodeSignature -LiteralPath $m.FullName
            if ($sig.Status -ne 'Valid') { throw "$($m.Name) 公開資産の署名が Valid でない: $($sig.Status)" }
            if ($sig.SignerCertificate.Subject -notlike "*$($env:SIGNER_SUBJECT)*") { throw "$($m.Name) Subject 不一致" }
            # .sha256 突合
            $shaFile = "$($m.FullName).sha256"
            if (-not (Test-Path $shaFile)) { throw "$($m.Name).sha256 が公開されていない" }
            $expected = ((Get-Content $shaFile -Raw) -split '\s+')[0]
            $actual = (Get-FileHash -Path $m.FullName -Algorithm SHA256).Hash
            if ($actual -ne $expected) { throw "$($m.Name) の SHA256 不一致: 公開.sha256=$expected 実体=$actual" }
            # 証跡: どのリリースがどの証明書で署名されたか(遡及失効時の影響範囲告知に要る。決定8)
            Write-Host "OK $($m.Name): Subject='$($sig.SignerCertificate.Subject)' Thumbprint=$($sig.SignerCertificate.Thumbprint) NotAfter=$($sig.SignerCertificate.NotAfter)"
          }
          Write-Host "公開後検証 OK"
