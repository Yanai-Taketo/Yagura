# ADR-0009 決定6 Phase 0(ゲート)の実施ワークフロー。
#
# 目的: SDK feature band を揃えた環境で `dotnet publish -r win-arm64 --self-contained true` の
# 実機検証を行い、決定6 Phase0 の客観的合否基準(publish 成功・ネイティブ資産の存在・
# ARM64 実機起動・受信->保存->閲覧到達・観測性カウンタの出力)を満たすことを確認する
# (委任事項1)。開発機(x64)では実機起動確認ができないため(Issue #123 と同じ制約)、
# windows-11-arm ホストランナーを使う——Yagura リポジトリは public であり、public
# リポジトリの標準ホストランナー(windows-11-arm 含む)は無料枠で利用できる
# (GitHub-hosted runners reference、確認日 2026-07-09。ADR-0009 CI 節)。
#
# 本 workflow は Phase 0 のゲート通過確認専用であり、恒久的な CI ステップではない
# (ADR-0009 決定5 が挙げる「ネイティブ依存変更 PR への軽量チェック追加」は Phase 1 の
# 検討事項として別途扱う——委任事項6)。トリガは workflow_dispatch と、本ファイル自身を
# 変更する pull_request のみ(installer-e2e.yml と同じトリガ設計。workflow_dispatch は
# GitHub の制約上、既定ブランチにファイルが存在しないと呼び出せない——ゲート導入 PR
# 自身の上で実行し run URL を PR に記録できる経路として pull_request を残す)。
# src/ 側の変更では実行しない。
name: ADR-0009 Phase 0 ARM64 Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/adr-0009-arm64-phase0-gate.yml'

permissions:
  contents: read

jobs:
  arm64-phase0-gate:
    runs-on: windows-11-arm
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # ADR-0009 決定6 Phase0 手順の第一歩: SDK feature band の事前確認。
      # Issue #123 はこの不一致で検証に着手できなかった(同じ罠を踏まないための最初のステップ)。
      # 判定は「global.json を検証環境の dotnet --version が解決できること」(ADR の文言どおり)。
      # 厳密一致は要求しない——global.json は rollForward: latestFeature を指定しており
      # (かつ main は #174 で version を 10.0.100 の下限へ引き下げ済み)、下限以上の最新
      # feature band へ解決されるのが正しい挙動。解決不能時は dotnet --version 自体が
      # 非ゼロ終了する("A compatible .NET SDK was not found")のでそれを検知する。
      - name: Confirm SDK feature band resolution
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $gj = (Get-Content global.json -Raw | ConvertFrom-Json).sdk
          Write-Host "global.json: version=$($gj.version) rollForward=$($gj.rollForward)"
          $resolved = (dotnet --version)
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet --version failed (exit $LASTEXITCODE): global.json SDK requirement could not be resolved on this runner"
          }
          Write-Host "resolved SDK = $resolved (feature band resolution OK)"

      # 決定6 Phase0 基準2: publish が成功し、ネイティブ資産(e_sqlite3.dll・SqlClient SNI)が
      # 出力に含まれること。ADR 起案時点(決定3)で未実施だった実機 publish 検証。
      - name: Publish Yagura.Host (win-arm64, self-contained)
        run: dotnet publish src/Yagura.Host/Yagura.Host.csproj -c Release -r win-arm64 --self-contained true -o publish/host

      - name: Publish Yagura.Web (win-arm64, self-contained)
        run: dotnet publish src/Yagura.Web/Yagura.Web.csproj -c Release -r win-arm64 --self-contained true -o publish/web

      # ファイル存在確認だけでなく PE ヘッダの Machine フィールド(IMAGE_FILE_MACHINE_ARM64 =
      # 0xAA64)を読み、x64 資産が誤って混入していないことまで確認する。
      - name: Verify native ARM64 assets
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Get-PEMachine {
            param([string]$Path)
            $fs = [System.IO.File]::OpenRead($Path)
            try {
              $br = New-Object System.IO.BinaryReader($fs)
              $fs.Seek(0x3C, 'Begin') | Out-Null
              $peOffset = $br.ReadInt32()
              $fs.Seek($peOffset, 'Begin') | Out-Null
              [void]$br.ReadUInt32()
              return ('{0:X4}' -f $br.ReadUInt16())
            }
            finally {
              $fs.Close()
            }
          }

          $targets = @(
            'publish/host/e_sqlite3.dll',
            'publish/host/Microsoft.Data.SqlClient.SNI.dll',
            'publish/host/Yagura.Host.exe',
            'publish/web/e_sqlite3.dll'
          )
          $failed = $false
          foreach ($t in $targets) {
            if (-not (Test-Path -Path $t)) {
              Write-Host "MISSING: $t"
              $failed = $true
              continue
            }
            $machine = Get-PEMachine -Path (Resolve-Path -Path $t)
            $ok = ($machine -eq 'AA64')
            $label = if ($ok) { '(ARM64 OK)' } else { '(NOT ARM64!)' }
            Write-Host ("{0}: machine=0x{1} {2}" -f $t, $machine, $label)
            if (-not $ok) { $failed = $true }
          }
          if ($failed) {
            throw 'native ARM64 asset verification failed'
          }

      # 決定6 Phase0 基準3・4: ARM64 実機で Yagura.Host が起動し、SQLite 既定構成で
      # 受信 -> 保存 -> 閲覧到達まで成功すること、観測性カウンタ(architecture.md §4.1)が
      # 出力されること。ポートは既定(UDP 514 / HTTP 8514)を避け、installer-e2e.yml の
      # SendVerifyOnly 相当の非特権ポートを使う(管理者権限自体はランナーで足りているが、
      # 既定ポートの衝突を避けるため)。
      - name: Start Yagura.Host and verify receive-store-view + counters
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $dataRoot = Join-Path $env:RUNNER_TEMP 'yagura-arm64-gate-data'
          New-Item -ItemType Directory -Force -Path $dataRoot | Out-Null
          $udpPort = 51514
          $httpPort = 58514

          $env:YAGURA_DATAROOT = $dataRoot
          $env:YAGURA_UDP_PORT = "$udpPort"
          $env:YAGURA_TCP_PORT = '0'
          $env:YAGURA_HTTP_PORT = "$httpPort"
          $env:YAGURA_ADMIN_PORT = '0'

          $exe = (Resolve-Path 'publish/host/Yagura.Host.exe').Path
          $stdoutLog = Join-Path $env:RUNNER_TEMP 'yagura-host-stdout.log'
          $stderrLog = Join-Path $env:RUNNER_TEMP 'yagura-host-stderr.log'
          $proc = Start-Process -FilePath $exe -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -WindowStyle Hidden

          try {
            $viewerBase = "http://127.0.0.1:$httpPort"
            $searchUrl = "$viewerBase/search"
            $statusUrl = "$viewerBase/status"
            $runId = 'YAGURA-ARM64-GATE-' + [Guid]::NewGuid().ToString('N')
            $message = "<134>yagura-arm64-gate $runId"

            # 起動待ち + 受信 -> 保存 -> 閲覧到達の確認(installer-e2e.yml の
            # Test-ViewerContainsToken と同じ照合方式: /search の初期表示 prerender に
            # メッセージ本文が現れることをポーリングで確認する)。
            $found = $false
            $sendCount = 0
            $deadline = [DateTime]::UtcNow.AddSeconds(90)
            while ([DateTime]::UtcNow -lt $deadline) {
              try {
                $client = New-Object System.Net.Sockets.UdpClient
                $bytes = [System.Text.Encoding]::ASCII.GetBytes($message)
                [void]$client.Send($bytes, $bytes.Length, '127.0.0.1', $udpPort)
                $client.Close()
                $sendCount++
              }
              catch {}
              Start-Sleep -Milliseconds 500
              try {
                $resp = Invoke-WebRequest -Uri $searchUrl -UseBasicParsing -TimeoutSec 5
                if ($resp.Content.Contains($runId)) {
                  $found = $true
                  break
                }
              }
              catch {}
            }
            if (-not $found) {
              throw "token $runId did not appear on $searchUrl within timeout (sent $sendCount datagram(s) to udp/$udpPort)"
            }
            Write-Host "OK: receive -> store -> view confirmed (runId=$runId, datagrams sent=$sendCount)"

            # 観測性カウンタの出力確認(architecture.md §4.1.1 の計器一覧。/status ページは
            # 常に全計器を表示するため、トラフィックの有無に関わらず計器名自体は現れる)。
            $statusResp = Invoke-WebRequest -Uri $statusUrl -UseBasicParsing -TimeoutSec 10
            $expectedInstruments = @(
              'yagura.ingestion.internal_buffer.dropped',
              'yagura.ingestion.udp.receive_error',
              'yagura.ingestion.spool.evacuated'
            )
            foreach ($inst in $expectedInstruments) {
              if (-not $statusResp.Content.Contains($inst)) {
                throw "counter instrument '$inst' not found on $statusUrl"
              }
            }
            Write-Host "OK: observability counters present on $statusUrl ($($expectedInstruments -join ', '))"
          }
          finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arm64-phase0-gate-evidence
          path: |
            ${{ runner.temp }}/yagura-host-stdout.log
            ${{ runner.temp }}/yagura-host-stderr.log
          if-no-files-found: warn
