name: 機能要望 / Feature request
description: 新機能・改善の提案 / Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        日本語・英語どちらでも歓迎です。/ Proposals are welcome in Japanese or English.
        プロジェクトのスコープ(やらないことの一覧を含む)は [ADR-0001](https://github.com/Yanai-Taketo/Yagura/blob/main/docs/adr/0001-project-founding.md) に定義されています。
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題 / Problem to solve
      description: どんな場面で何に困っているか(機能の形ではなく課題として書いていただけると、より良い解決策を検討できます)
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策 / Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案 / Alternatives considered
      description: 既存機能・他ツールでの回避策を試した場合はその結果も
