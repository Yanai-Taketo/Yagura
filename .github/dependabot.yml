# Dependabot 設定(依存の脆弱性対策の「継続監視」層)。
#
# 依存の脆弱性検知は三層で構成する(conventions.md「CI」):
#   1. NuGet Audit — Directory.Build.props の NuGetAuditMode=all + WarningsAsErrors(NU1900-1904)。
#      restore/build のたびに照合し、PR をブロックする(既存の仕組み)
#   2. dependency-review-action(.github/workflows/dependency-review.yml)— PR 差分として
#      入ってくる依存(GitHub Actions を含む)を審査する
#   3. Dependabot(本ファイル + リポジトリ設定の脆弱性アラート / 自動セキュリティ更新)—
#      マージ後・リリース後も継続監視し、脆弱性公表時に修正 PR を自動作成する
#
# フォワーダ配布キットの Fluent Bit 版は対象外(conventions.md「フォワーダ配布キット
# (Fluent Bit)の版運用」— 自動監視は組まず、CVE 公表時とリリース準備時の手動確認とする
# 決定)。本ファイルが見るのは NuGet と GitHub Actions のみ。
version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    # 通常の版追従はまとめて 1 本の PR にする(minor / patch)。major は個別 PR。
    # セキュリティ更新はグループ化の対象外で、常に個別 PR として即時作成される。
    groups:
      nuget-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
