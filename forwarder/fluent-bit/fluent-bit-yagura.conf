# fluent-bit-yagura.conf — Windows イベントログを Yagura へ syslog (RFC 5424) 転送する
# Fluent Bit (https://fluentbit.io/) 用のプリコンフィグ設定。
# @@YAGURA_HOST@@ / @@YAGURA_PORT@@ / @@CHANNELS@@ / @@MODE@@ / @@TLS_BLOCK@@ は install.ps1 が
# 導入時に置換する。手動配置する場合は該当箇所を Yagura サーバの IP/ホスト名等に書き換えること。
# @@MODE@@ (udp/tcp): tcp は Fluent Bit の out_syslog が RFC 6587 octet-counting に非対応で
# LF 区切りになるため既知の制約がある。詳細は docs/guides/forward-windows-eventlog.md 参照。
# @@TLS_BLOCK@@ (Issue #137): syslog over TLS（RFC 5425。TCP 6514。Yagura 側 opt-in）への送信時、
# install.ps1 -Mode tls が Mode を tcp に固定したうえで tls 系の行をここへ挿入する
# （Fluent Bit の out_syslog に Mode = tls という値は無い——公式ドキュメント確認、2026-07-10。
# TLS は Mode tcp + tls On の組み合わせで有効化する）。udp/tcp モードでは空行のまま。
# **既知の非互換（2026-07-11 実機確認）**: out_syslog は TLS 有効時も RFC 6587 octet-counting
# フレーミングを実装しない（LF 区切りのまま）。RFC 5425 は octet-counting を必須とし、Yagura の
# TLS 受信はこれを厳格に強制するため、TLS ハンドシェイクは成功してもメッセージは Yagura 側で
# 拒否され、かつ Fluent Bit 側はこの拒否を検知できない（無応答のため無音の喪失）。詳細は
# install.ps1 の -Mode tls コメントと docs/guides/forward-windows-eventlog.md を参照。

[SERVICE]
    flush        5
    log_level    info
    log_file     C:\ProgramData\fluent-bit-yagura\fluent-bit.log

[INPUT]
    Name                 winevtlog
    Tag                  winevt
    Channels             @@CHANNELS@@
    Interval_Sec         5
    Read_Existing_Events false
    DB                   C:\ProgramData\fluent-bit-yagura\winevtlog.sqlite

[FILTER]
    Name    lua
    Match   winevt
    script  C:\ProgramData\fluent-bit-yagura\winevt-severity.lua
    call    enrich_winevt

[OUTPUT]
    Name                syslog
    Match               winevt
    Host                @@YAGURA_HOST@@
    Port                @@YAGURA_PORT@@
    Mode                @@MODE@@
    Syslog_Format       rfc5424
    Syslog_Hostname_Key Computer
    Syslog_Appname_Key  SyslogAppname
    Syslog_Message_Key  Message
    Syslog_Severity_Key SyslogSeverity
    Syslog_Facility_Key SyslogFacility
    Syslog_SD_Key       winevt
@@TLS_BLOCK@@
